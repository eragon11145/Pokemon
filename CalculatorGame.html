<body onload="hide()">

  <h1>Guess the Pokemon by its stats! Hit New Game to Start!</h1>
  <div class='HealthBar' id='HealthBar' style: "width:44.44%">
    <p id="Health"> </p>
  </div>
  <div class='AttackBar' id='AttackBar'>
    <p id="Attack"> </p>
  </div>
  <div class='DefenseBar' id='DefenseBar'>
    <p id="Defense"> </p>
  </div>
  <div class='SpecialAttackBar' id='SpecialAttackBar'>
    <p id="SpecialAttack"> </p>
  </div>
  <div class='SDFBar' id='SDFBar'>
    <p id="SpecialDefense"> </p>
  </div>
  <div class='SPDBar' id='SPDBar'>
    <p id="Speed"> </p>
  </div>
  <p id="Attacker"> </p>
  <p id='Defender'> </p>
  <p id='Damagee'> </p>
  <p id='Hinted'> </p>
  <script src="script.js">

  </script>
  <button type='button' onclick="newgame()">New Game</button>
  <input type='text' id='answer'>
  <button type='button' onclick="guess(document.getElementById('answer').value)">Go!</button>
  <button type='button' onclick="hint()">Hint</button>
  <button type='button' onclick="answer()">Show Answer</button>
  <p id='Answered'> </p>
